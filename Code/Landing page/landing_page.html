<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernl.js</title>
    <link rel="stylesheet" href="landing_page.css">
    <link rel="stylesheet" href="../global.css">
</head>
<script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>

<body>
    <header>
        <span class="logo">Kernl.js</span>
        <div class="button-container">

            <div class="github-stars">
                <img src="../../Illustrations/github.svg" alt="github">
                <span>100.1K</span>
            </div>
            <div class="get-in"><span>Get Started</span></div>
        </div>
    </header>


    <div class="container">
        <section class="hero">
            <div class="hero-content">
                <h1 class="title">THE CORE OF YOUR WORKFLOW.</h1>
                <p class="description">
                    A modular, Git-native interface for technical project management. <br>
                    Sync your tasks to GitHub and your assets to Google Drive with zero configuration.
                </p>

                <div class="hero-buttons">
                    <div class="btn-primary"><span>Get Started</span></div>
                    <div class="btn-secondary"><span>View on Github</span></div>
                </div>
            </div>

            <div class="hero-animation">
                <div id="lottie-container">
                    <dotlottie-player src="../../Designs/mascot_idle_animation.json" background="transparent" speed="1"
                        loop autoplay></dotlottie-player>
                </div>
            </div>
        </section>
    </div>
</body>

</html>
